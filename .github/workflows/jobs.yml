name: Jobs

on:
  workflow_call:
    inputs:
      exclude_tags:
        type: string
        default: 'Impact'
      report_on_failure_only:
        type: boolean
        default: false
      job_label:
        type: string
        default: 'Run'
      notify_on_recovery:
        type: boolean
        default: false

env:
  JAVA_VERSION: '17'
  BROWSER_VERSION: '128.0'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Pull Chrome image
        run: docker pull selenoid/chrome:${{ env.BROWSER_VERSION }}

      - name: Start Selenoid
        run: |
            docker run -d \
              --name selenoid \
              --network host \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v ${{ github.workspace }}/browsers.json:/etc/selenoid/browsers.json \
              aerokube/selenoid:latest

      - name: Wait for Selenoid to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:4444/status && break
            echo "Waiting for Selenoid... ($i/30)"
            sleep 2
          done

      - name: Build and run tests
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.exclude_tags }}" ]; then
            EXTRA_ARGS="-DexcludeTags=${{ inputs.exclude_tags }}"
          fi
          ./gradlew clean test \
           --warning-mode all \
            -Denvironment=remote_chrome \
            $EXTRA_ARGS \
            --no-daemon

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: build/allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ inputs.job_label }}
          path: |
            build/reports/
            build/allure-results/
          retention-days: 20

      - name: Check previous run result
        if: always()
        run: |
          PREV_CONCLUSION=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?event=schedule&per_page=10" \
            | jq -r --arg RUN_ID "${{ github.run_id }}" \
              '[.workflow_runs[] | select(.status == "completed" and (.id | tostring) != $RUN_ID)][0].conclusion // "success"')
          echo "Previous conclusion: $PREV_CONCLUSION"
          [ "$PREV_CONCLUSION" = "failure" ] \
            && echo "PREV_FAILED=true"  >> $GITHUB_ENV \
            || echo "PREV_FAILED=false" >> $GITHUB_ENV

      - name: Suppression for nightly reports
        if: always()
        run: |
          HOUR_UTC=$(date -u +%H)
          HOUR_LOCAL=$(( (HOUR_UTC + 3) % 24 ))
          if [ "$HOUR_LOCAL" -ge 23 ] || [ "$HOUR_LOCAL" -lt 7 ]; then
            echo "SUPPRESS_REPORTS=true" >> $GITHUB_ENV
          else
            echo "SUPPRESS_REPORTS=false" >> $GITHUB_ENV
          fi

      - name: Calculate REPORT_NUM
        if: always()
        run: |
          REPORT_NUM=$(ls -d allure-history/[0-9]*/ 2>/dev/null | sed 's|allure-history/||;s|/||' | sort -n | tail -1)
          echo "REPORT_NUM=$REPORT_NUM"
          echo "REPORT_NUM=$REPORT_NUM" >> $GITHUB_ENV
          SUMMARY="allure-report/widgets/summary.json"
          echo "PASSED=$(jq  '.statistic.passed'  $SUMMARY)" >> $GITHUB_ENV
          echo "FAILED=$(jq  '.statistic.failed'  $SUMMARY)" >> $GITHUB_ENV
          echo "BROKEN=$(jq  '.statistic.broken'  $SUMMARY)" >> $GITHUB_ENV
          echo "SKIPPED=$(jq '.statistic.skipped' $SUMMARY)" >> $GITHUB_ENV
          echo "TOTAL=$(jq   '.statistic.total'   $SUMMARY)" >> $GITHUB_ENV
          FAILED_VAL=$(jq '.statistic.failed' $SUMMARY)
          BROKEN_VAL=$(jq '.statistic.broken' $SUMMARY)
          EMOJI=$([ "$FAILED_VAL" = "0" ] && [ "$BROKEN_VAL" = "0" ] && echo "✅" || echo "❌")
          echo "EMOJI=$EMOJI" >> $GITHUB_ENV
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV

      - name: Send email
        if: ${{ always() && env.SUPPRESS_REPORTS != 'true' && (!inputs.report_on_failure_only || failure() || (inputs.notify_on_recovery && env.PREV_FAILED == 'true')) }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.yandex.ru
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "${{ env.EMOJI }} ${{ inputs.job_label }} — ${{ env.REPO_NAME }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: "GitHub CI <${{ secrets.EMAIL_USERNAME }}>"
          html_body: |
            <p>${{ env.EMOJI }} ${{ inputs.job_label }} — ${{ env.REPO_NAME }}</p>            
            <p>
            Passed:  <code style="color:#2196F3">${{ env.PASSED }}</code><br>
            Failed:  <code style="color:#2196F3">${{ env.FAILED }}</code><br>
            Broken:  <code style="color:#2196F3">${{ env.BROKEN }}</code><br>
            Skipped: <code style="color:#2196F3">${{ env.SKIPPED }}</code><br>
            Total:   <code style="color:#2196F3">${{ env.TOTAL }}</code>
            </p>
            <p>https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ env.REPORT_NUM }}/</p>

      - name: Send Telegram notification
        if: ${{ always() && env.SUPPRESS_REPORTS != 'true' && (!inputs.report_on_failure_only || failure() || (inputs.notify_on_recovery && env.PREV_FAILED == 'true')) }}
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          SUMMARY="allure-report/widgets/summary.json"
          PASSED=$(jq  '.statistic.passed'  $SUMMARY)
          FAILED=$(jq  '.statistic.failed'  $SUMMARY)
          BROKEN=$(jq  '.statistic.broken'  $SUMMARY)
          SKIPPED=$(jq '.statistic.skipped' $SUMMARY)
          TOTAL=$(jq   '.statistic.total'   $SUMMARY)
          STATUS="${{ job.status }}"
          EMOJI=$([ "$FAILED" = "0" ] && [ "$BROKEN" = "0" ] && echo "✅" || echo "❌")
          TEXT="${EMOJI} *${{ inputs.job_label }} — ${REPO_NAME}*
            Passed:  \`${PASSED}\`
            Failed:  \`${FAILED}\`
            Broken:  \`${BROKEN}\`
            Skipped: \`${SKIPPED}\`
            Total:   \`${TOTAL}\`
          https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${REPORT_NUM}/"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            --data-urlencode text="$TEXT"